<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>

    <title>دروس React Native - مسار</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/g.css') }}">
</head>
<body class="lessonss-page">
    <header class="main-header">
        <div class="nav-container">
            <a href="{{ url_for('track_detail', slug='mobile') }}" class="btn-modern3">رجوع</a>

        <div class="logo-container">

    <main class="course-container">

            <h3>بناء تطبيقات iOS و Android بـ JavaScript</h3>

        <hr>
        <aside class="video">
            <iframe width="120" height="120" src="https://www.youtube.com/embed/7TQhxAOjd1w" title="RN 1" frameborder="0" allowfullscreen></iframe>
            <iframe width="120" height="120" src="https://www.youtube.com/embed/FmIUk3bWGmU" title="RN 2" frameborder="0" allowfullscreen></iframe>
            <iframe width="120" height="120" src="https://www.youtube.com/embed/8Z7zR-UGjcQ" title="RN 3" frameborder="0" allowfullscreen></iframe>
            <iframe width="120" height="120" src="https://www.youtube.com/embed/SUW49Jjxvac" title="RN 4" frameborder="0" allowfullscreen></iframe>

            <iframe width="120" height="120" src="https://www.youtube.com/embed/IGeh2mlM9Rg" title="RN 6" frameborder="0" allowfullscreen></iframe>

            <iframe width="120" height="120" src="https://www.youtube.com/embed/r6LhFImQxeE" title="RN 9" frameborder="0" allowfullscreen></iframe>
            <iframe width="120" height="120" src="https://www.youtube.com/embed/uj5lC-GQPEw" title="RN 10" frameborder="0" allowfullscreen></iframe>
        </aside>
    </main>

    <div class="button-row">
        <a href="{{ url_for('exam', slug='react_native') }}" class="btn-modern">ابدأ الامتحان</a>
    </div>

    <div id="chat-icon" onclick="toggleChat()">💬</div>
    <div id="ai-chat-container">
        <div id="chat-header">بوت مسار الذكي</div>
        <div id="chat-output">أهلاً، أنا مساعدك الذكي. كيف يمكنني مساعدتك؟</div>
        <div id="chat-input-area">
            <input type="text" id="user-query" placeholder="اكتب سؤالك هنا...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
