<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ابدأ رحلتك - مسار</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/g.css') }}">
</head>
<body class="lessonss-page">
    <header class="main-header">
        <div class="nav-container">
            <a href="{{ url_for('auth') }}" class="btn-modern3">رجوع</a>
            <a href="{{ url_for('profile') }}" class="btn-modern3">ملفي الشخصي</a>
        </div>
        <div class="logo-container">
            <a href="{{ url_for('index') }}" class="brand-name">Masar</a>
            <img src="{{ url_for('static', filename='image/lo.png') }}" alt="شعار" class="header-logo">
        </div>
    </header>

    <div class="main-content">
        <h1>كيف تريد أن تبدأ؟</h1>
        <p>اختر الطريقة التي تناسبك لبدء رحلتك التعليمية</p>
    </div>

    <div class="choices-container">
        <div class="option-circle">
            <h1>تحتاج مساعدة؟</h1>
            <p>أجب على أسئلة الاختبار الذكي</p>
            <div class="button-row">
                <a href="{{ url_for('quiz') }}" class="btn-modern">ابدأ</a>
            </div>
        </div>

        <div class="option-circle">
            <h1>أعرف طريقي</h1>
            <p>اختر مسارك التعليمي مباشرةً</p>
            <div class="button-row">
                <a href="{{ url_for('tracks') }}" class="btn-modern">خرائط الطريق</a>
            </div>
        </div>
    </div>

    <div id="chat-icon" onclick="toggleChat()">💬</div>
    <div id="ai-chat-container">
        <div id="chat-header">بوت مسار الذكي</div>
        <div id="chat-output">أهلاً، أنا مساعدك الذكي. كيف يمكنني مساعدتك؟</div>
        <div id="chat-input-area">
            <input type="text" id="user-query" placeholder="اكتب سؤالك هنا...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
