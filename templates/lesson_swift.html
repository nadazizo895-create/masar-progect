<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>دروس Swift - مسار</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/g.css') }}">
</head>
<body class="lessonss-page">
    <header class="main-header">
        <div class="nav-container">
            <a href="{{ url_for('track_detail', slug='mobile') }}" class="btn-modern3">رجوع</a>
            <a href="{{ url_for('profile') }}" class="btn-modern3">ملفي الشخصي</a>
              <a href="{{ url_for('library_pro') }}" class="btn-modern3">الذهاب إلى المكتبة</a>
        </div>
        <div class="logo-container">
            <a href="{{ url_for('index') }}" class="brand-name">Masar</a>
            <img src="{{ url_for('static', filename='image/lo.png') }}" alt="شعار" class="header-logo">
        </div>
    </header>

    <main class="course-container">
        <div class="text-center">
            <h1>🍎 دروس Swift</h1>
          <iframe width="560" height="315" src="https://www.youtube.com/embed/zjaesZXekc0?si=8j0HiFIQahkfM1ss" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <h3>تطوير تطبيقات iOS الأصيلة بـ Swift</h3>
        </div>
        <hr>

    </main>

    <div class="button-row">
        <a href="{{ url_for('exam', slug='swift') }}" class="btn-modern">ابدأ الامتحان</a>
    </div>

    <div id="chat-icon" onclick="toggleChat()">💬</div>
    <div id="ai-chat-container">
        <div id="chat-header">بوت مسار الذكي</div>
        <div id="chat-output">أهلاً، أنا مساعدك الذكي. كيف يمكنني مساعدتك؟</div>
        <div id="chat-input-area">
            <input type="text" id="user-query" placeholder="اكتب سؤالك هنا...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
